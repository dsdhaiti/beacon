name: Feature Request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels: ["enhancement", "feature-request"]
# projects: ["beacon"]
assignees:
  - octocat

body:
  - type: markdown
    attributes:
      value: 
        Thank you for helping improve this project!
        Before submitting a feature request, please check existing issues to see if your idea has already been suggested.

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we reach you if we need clarification?
      placeholder: ex. email@example.com
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: Describe the challenge, frustration, or limitation you are experiencing.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or enhancement you would like to see.
      placeholder: Explain how you envision this feature working.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical
        - High
        - Medium
        - Low
      default: 2
    validations:
      required: true

  - type: dropdown
    id: impact-area
    attributes:
      label: Area of Impact
      description: Which part of the project would this feature affect?
      options:
        - User Interface (UI)
        - API
        - Backend
        - Authentication
        - Performance
        - Documentation
        - Developer Experience
        - Integrations
        - Other
    validations:
      required: true

  - type: upload
    id: mockups
    attributes:
      label: Mockups / Examples
      description: Include screenshots, links, diagrams, or examples from other products if applicable.
      placeholder: Add references that help explain the feature.

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Checklist
      description: Please confirm the following before submitting.
      options:
        - label: I searched existing issues to ensure this feature has not already been requested.
          required: true
        - label: I have clearly described the problem this feature would solve.
          required: true
        - label: I understand that submitting a feature request does not guarantee implementation.
          required: true

  - type: upload
    id: attachments
    attributes:
      label: Supporting Files
      description: Upload screenshots, diagrams, mockups, or other supporting materials.
    validations:
      required: false
